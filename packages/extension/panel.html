<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FluxAPI</title>
<style>
/* ═══════════ TOKENS ═══════════ */
:root {
  --bg: #0e0e1a; --bg2: #13132a; --bg3: #1c1c3a; --bg4: #252550;
  --fg: #e2e4f0; --fg2: #9ca3bf; --fg3: #636b83;
  --accent: #7c6afc; --accent2: #9d8cff; --accent-glow: rgba(124,106,252,0.25);
  --green: #3dd68c; --red: #f06b7e; --orange: #f0a84a; --blue: #5ba8f5; --cyan: #40d9d9;
  --border: rgba(255,255,255,0.06);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
  --radius: 8px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 12px; line-height: 1.5; overflow: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--fg3); }

.panel { display: flex; flex-direction: column; height: 100vh; }

/* ═══════════ HEADER ═══════════ */
.header {
  display: flex; align-items: center; gap: 10px; padding: 6px 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  position: relative; z-index: 10;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
}
.logo { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: 13px; letter-spacing: -0.3px; }
.logo .icon {
  width: 20px; height: 20px; background: var(--accent); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.logo .icon svg { width: 12px; height: 12px; }

.scan-btn {
  padding: 4px 14px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 11px; font-weight: 700; font-family: var(--font); transition: all var(--transition);
  letter-spacing: 0.3px; text-transform: uppercase;
}
.scan-btn.start {
  background: linear-gradient(135deg, var(--green), #2bc47a); color: #0a1a12;
  box-shadow: 0 2px 12px rgba(61,214,140,0.25);
}
.scan-btn.start:hover { filter: brightness(1.1); transform: translateY(-1px); }
.scan-btn.stop {
  background: linear-gradient(135deg, var(--red), #e04a5e); color: white;
  box-shadow: 0 2px 12px rgba(240,107,126,0.25);
  animation: pulse-stop 2s infinite;
}
@keyframes pulse-stop { 0%,100% { box-shadow: 0 2px 12px rgba(240,107,126,0.25); } 50% { box-shadow: 0 2px 20px rgba(240,107,126,0.4); } }
.scan-btn.analyzing { background: var(--bg4); color: var(--fg2); cursor: wait; }

.status { font-size: 11px; color: var(--fg3); font-family: var(--mono); }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.net-select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--fg2);
  padding: 3px 6px; border-radius: 5px; font-size: 10px; font-family: var(--font); cursor: pointer;
}
.h-btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--fg3);
  padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: 10px;
  font-family: var(--font); transition: all var(--transition);
}
.h-btn:hover { color: var(--fg); border-color: var(--fg3); }

/* ═══════════ TABS ═══════════ */
.tabs {
  display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
}
.tab {
  padding: 6px 16px; font-size: 11px; font-weight: 600; color: var(--fg3);
  border: none; background: none; cursor: pointer; position: relative;
  transition: color var(--transition); font-family: var(--font);
}
.tab:hover { color: var(--fg2); }
.tab.active { color: var(--accent2); }
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px; height: 2px;
  background: var(--accent); border-radius: 2px 2px 0 0;
}
.tab .badge {
  display: inline-block; margin-left: 4px; padding: 0 5px; border-radius: 99px;
  font-size: 9px; font-weight: 700; background: var(--bg4); color: var(--fg3);
}
.tab .badge.critical { background: rgba(240,107,126,0.15); color: var(--red); }

/* ═══════════ CONTENT ═══════════ */
.content { flex: 1; overflow-y: auto; }
.tab-panel { display: none; padding: 12px; min-height: 100%; }
.tab-panel.active { display: block; }

/* ═══════════ IDLE STATE ═══════════ */
.idle {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 80px); text-align: center; gap: 10px;
}
.idle .glow {
  width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
  background: var(--bg3); font-size: 28px; position: relative;
}
.idle .glow::after {
  content: ''; position: absolute; inset: -4px; border-radius: 20px;
  background: radial-gradient(circle, var(--accent-glow), transparent 70%); z-index: -1;
}
.idle h2 { font-size: 15px; font-weight: 700; color: var(--fg); }
.idle p { font-size: 12px; color: var(--fg3); max-width: 280px; line-height: 1.6; }
.idle code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 11px; color: var(--accent2); }

/* ═══════════ LIVE VIEW ═══════════ */
.live { text-align: center; padding-top: 40px; }
.live-num {
  font-size: 64px; font-weight: 900; letter-spacing: -3px; line-height: 1;
  background: linear-gradient(135deg, var(--accent2), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.live-label { font-size: 12px; color: var(--fg3); margin-top: 2px; }
.live-timer { font-size: 18px; color: var(--fg2); margin-top: 12px; font-family: var(--mono); font-weight: 700; }
.live-bar {
  width: 200px; height: 3px; background: var(--bg3); border-radius: 99px; margin: 16px auto 0; overflow: hidden;
}
.live-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan));
  border-radius: 99px; animation: progress-slide 1.5s infinite;
}
@keyframes progress-slide { 0% { width: 0; margin-left: 0; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0; margin-left: 100%; } }

.live-feed { max-width: 420px; margin: 20px auto 0; text-align: left; }
.live-req {
  display: flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 4px;
  font-size: 11px; font-family: var(--mono); color: var(--fg3);
  animation: req-in 0.3s ease; margin-bottom: 2px;
}
@keyframes req-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
.live-req .m { color: var(--accent2); font-weight: 700; width: 32px; }
.live-req .u { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.live-req .t { color: var(--orange); font-size: 10px; }

/* ═══════════ SCORE SECTION ═══════════ */
.score-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-start; }

.score-gauge { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
.score-gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-gauge .track { fill: none; stroke: var(--bg3); stroke-width: 7; }
.score-gauge .value { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dasharray 1.2s ease; }
.score-gauge .num {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-gauge .num .n { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
.score-gauge .num .g { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

.score-details { flex: 1; }
.score-details h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 10px; text-align: center;
}
.stat-card .num { font-size: 18px; font-weight: 900; }
.stat-card .label { font-size: 9px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.stat-card.red .num { color: var(--red); }
.stat-card.orange .num { color: var(--orange); }
.stat-card.blue .num { color: var(--blue); }

/* ═══════════ CATEGORY BARS ═══════════ */
.cat-section { margin-bottom: 16px; }
.cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.cat-icon { width: 18px; text-align: center; font-size: 12px; }
.cat-name { width: 70px; font-size: 11px; color: var(--fg2); font-weight: 600; }
.cat-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }
.cat-pct { width: 36px; text-align: right; font-size: 11px; font-weight: 800; font-family: var(--mono); }

/* ═══════════ VIOLATIONS ═══════════ */
.v-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; transition: all var(--transition); overflow: hidden;
}
.v-card:hover { border-color: rgba(124,106,252,0.3); }
.v-card.expanded { border-color: var(--accent); }
.v-card.expanded .v-expand { display: block; }
.v-head {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer;
  user-select: none;
}
.v-sev {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.v-sev.critical { background: var(--red); color: var(--red); }
.v-sev.warning { background: var(--orange); color: var(--orange); }
.v-sev.info { background: var(--blue); color: var(--blue); }
.v-rule { font-size: 10px; font-weight: 800; font-family: var(--mono); color: var(--fg3); width: 22px; }
.v-title { flex: 1; font-size: 11px; font-weight: 600; }
.v-pills { display: flex; gap: 4px; }
.v-pill {
  font-size: 9px; padding: 1px 6px; border-radius: 99px; font-weight: 700;
  background: var(--bg4); color: var(--fg3);
}
.v-pill.time { background: rgba(91,168,245,0.1); color: var(--blue); }
.v-pill.reqs { background: rgba(61,214,140,0.1); color: var(--green); }
.v-pill.bw { background: rgba(240,168,74,0.1); color: var(--orange); }

.v-expand { display: none; padding: 0 10px 10px; }
.v-desc { font-size: 11px; color: var(--fg3); line-height: 1.6; margin-bottom: 8px; }

.v-fix {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.v-fix-head {
  display: flex; align-items: center; padding: 4px 8px;
  background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
  font-size: 10px; color: var(--fg3);
}
.v-fix-head .lang { font-family: var(--mono); }
.v-fix-head .copy-btn {
  margin-left: auto; background: none; border: 1px solid var(--border); color: var(--fg3);
  padding: 1px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; font-family: var(--font);
}
.v-fix-head .copy-btn:hover { color: var(--fg); }
.v-fix pre {
  padding: 8px; font-size: 11px; font-family: var(--mono); line-height: 1.6;
  color: var(--fg2); overflow-x: auto; white-space: pre;
}
.v-fix .kw { color: #c792ea; }
.v-fix .fn { color: #82aaff; }
.v-fix .str { color: #c3e88d; }
.v-fix .cm { color: #546e7a; font-style: italic; }

/* ═══════════ REQUEST LIST ═══════════ */
.req-table { width: 100%; border-collapse: collapse; }
.req-table th {
  text-align: left; padding: 4px 8px; font-size: 10px; color: var(--fg3);
  text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
  font-weight: 700; position: sticky; top: 0; background: var(--bg); z-index: 1;
}
.req-table td {
  padding: 3px 8px; font-size: 11px; font-family: var(--mono); border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;
}
.req-table tr:hover td { background: var(--bg2); }
.req-table .method { color: var(--accent2); font-weight: 700; }
.req-table .status-ok { color: var(--green); }
.req-table .status-err { color: var(--red); }
.req-table .dur { color: var(--orange); }
.req-table .type-tag {
  font-size: 9px; padding: 1px 5px; border-radius: 3px;
  background: var(--bg4); color: var(--fg3); font-family: var(--font);
}

/* ═══════════ WATERFALL VIZ ═══════════ */
.wf-container { margin-top: 8px; }
.wf-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; height: 18px; }
.wf-label { width: 120px; font-size: 10px; font-family: var(--mono); color: var(--fg3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
.wf-track { flex: 1; height: 10px; position: relative; background: rgba(255,255,255,0.02); border-radius: 2px; }
.wf-seg {
  position: absolute; height: 100%; border-radius: 2px; min-width: 3px;
  transition: all 0.4s ease;
}
.wf-seg.api { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.wf-seg.static { background: var(--bg4); }
.wf-time { width: 50px; font-size: 10px; font-family: var(--mono); color: var(--fg3); }

/* ═══════════ IMPACT BANNER ═══════════ */
.impact {
  display: flex; gap: 12px; padding: 10px 12px; border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(124,106,252,0.08), rgba(64,217,217,0.06));
  border: 1px solid rgba(124,106,252,0.15); margin-bottom: 16px;
}
.impact-item { text-align: center; flex: 1; }
.impact-item .val { font-size: 16px; font-weight: 900; }
.impact-item .lbl { font-size: 9px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.5px; }

/* ═══════════ EMPTY STATE ═══════════ */
.empty-state {
  text-align: center; padding: 32px; color: var(--fg3);
}
.empty-state .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
.empty-state p { font-size: 12px; }
</style>
</head>
<body>
<div class="panel">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="icon">
        <svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10M3 8h7M3 12h4" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      FluxAPI
    </div>
    <button id="scanBtn" class="scan-btn start">▶ SCAN</button>
    <span id="status" class="status"></span>
    <div class="header-right">
      <select id="netSel" class="net-select">
        <option value="wifi">WiFi</option>
        <option value="jio-4g">Jio 4G</option>
        <option value="airtel-4g">Airtel 4G</option>
        <option value="airtel-3g">Airtel 3G</option>
        <option value="slow-3g">Slow 3G</option>
        <option value="bsnl-2g">BSNL 2G</option>
      </select>
      <button id="exportHtmlBtn" class="h-btn" style="display:none">📄 HTML</button>
      <button id="exportJsonBtn" class="h-btn" style="display:none">{ } JSON</button>
      <button id="clearBtn" class="h-btn" style="display:none">Clear</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabBar" style="display:none">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="violations">Issues <span class="badge" id="vBadge" style="display:none">0</span></button>
    <button class="tab" data-tab="requests">Requests <span class="badge" id="rBadge">0</span></button>
    <button class="tab" data-tab="waterfall">Timeline</button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Idle -->
    <div class="tab-panel active" id="idlePanel">
      <div class="idle">
        <div class="glow">⚡</div>
        <h2>Ready to scan</h2>
        <p>Click <code>▶ SCAN</code>, then browse your app normally. Reload the page after starting for best results.</p>
        <p style="margin-top:4px">FluxAPI captures API traffic and detects waterfalls, duplicate requests, N+1 patterns, and missing cache headers.</p>
      </div>
    </div>

    <!-- Live -->
    <div class="tab-panel" id="livePanel"></div>

    <!-- Overview -->
    <div class="tab-panel" id="overviewPanel"></div>

    <!-- Violations -->
    <div class="tab-panel" id="violationsPanel"></div>

    <!-- Requests -->
    <div class="tab-panel" id="requestsPanel"></div>

    <!-- Waterfall -->
    <div class="tab-panel" id="waterfallPanel"></div>
  </div>
</div>

<script src="panel.js"></script>
</body>
</html>
