<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FluxAPI</title>
<style>
  :root {
    --bg: #1e1e2e; --bg2: #181825; --bg3: #313244;
    --fg: #cdd6f4; --fg2: #a6adc8; --fg3: #6c7086;
    --accent: #89b4fa; --accent2: #b4befe;
    --red: #f38ba8; --orange: #fab387; --green: #a6e3a1; --blue: #89b4fa;
    --border: #45475a;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--fg); font-size: 13px; line-height: 1.5; }

  .panel { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* ─── Header ─── */
  .header {
    display: flex; align-items: center; gap: 12px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 6px; font-weight: 700; color: var(--accent); font-size: 14px; }
  .logo svg { flex-shrink: 0; }

  .scan-btn {
    padding: 5px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: var(--font); transition: all 0.15s;
  }
  .scan-btn.start { background: var(--green); color: #1e1e2e; }
  .scan-btn.start:hover { filter: brightness(1.1); }
  .scan-btn.stop { background: var(--red); color: #1e1e2e; }
  .scan-btn.analyzing { background: var(--blue); color: #1e1e2e; opacity: 0.7; cursor: wait; }

  .status { font-size: 12px; color: var(--fg3); }
  .status .count { color: var(--accent); font-weight: 700; }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--fg2);
    padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 11px;
    font-family: var(--font); transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--fg); }

  .network-select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--fg2);
    padding: 4px 8px; border-radius: 5px; font-size: 11px; font-family: var(--font);
  }

  /* ─── Content ─── */
  .content { flex: 1; overflow-y: auto; padding: 12px; }

  /* ─── Idle State ─── */
  .idle-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--fg3); text-align: center; gap: 12px;
  }
  .idle-state .big-icon { font-size: 48px; opacity: 0.4; }
  .idle-state h2 { font-size: 16px; color: var(--fg2); }
  .idle-state p { font-size: 12px; max-width: 300px; }

  /* ─── Live Counter ─── */
  .live-view { text-align: center; padding-top: 60px; }
  .live-count { font-size: 72px; font-weight: 800; color: var(--accent); line-height: 1; }
  .live-label { font-size: 14px; color: var(--fg3); margin-top: 4px; }
  .live-timer { font-size: 20px; color: var(--fg2); margin-top: 16px; font-family: var(--mono); }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* ─── Score Display ─── */
  .score-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .score-circle {
    width: 80px; height: 80px; position: relative; flex-shrink: 0;
  }
  .score-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-circle .bg { fill: none; stroke: var(--bg3); stroke-width: 6; }
  .score-circle .fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dasharray 1s; }
  .score-value {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800;
  }
  .score-meta h2 { font-size: 15px; font-weight: 600; }
  .score-meta .grade { font-size: 13px; }
  .score-meta .stats { font-size: 11px; color: var(--fg3); margin-top: 2px; }

  /* ─── Category Bars ─── */
  .cats { margin-bottom: 16px; }
  .cat-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .cat-label { width: 90px; font-size: 12px; color: var(--fg2); }
  .cat-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .cat-fill { height: 100%; border-radius: 99px; transition: width 0.8s; }
  .cat-score { width: 30px; text-align: right; font-size: 12px; font-weight: 700; }

  /* ─── Violation List ─── */
  .section-title { font-size: 13px; font-weight: 700; color: var(--fg2); padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .violation {
    padding: 8px; margin-bottom: 6px; border-radius: 6px; background: var(--bg2);
    border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
  }
  .violation:hover { border-color: var(--accent); }
  .violation.expanded .v-body { display: block; }
  .v-header { display: flex; align-items: center; gap: 8px; }
  .v-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .v-dot.critical { background: var(--red); }
  .v-dot.warning { background: var(--orange); }
  .v-dot.info { background: var(--blue); }
  .v-title { font-size: 12px; font-weight: 600; flex: 1; }
  .v-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .v-badge.critical { background: rgba(243,139,168,0.15); color: var(--red); }
  .v-badge.warning { background: rgba(250,179,135,0.15); color: var(--orange); }
  .v-badge.info { background: rgba(137,180,250,0.15); color: var(--blue); }
  .v-body { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .v-desc { font-size: 11px; color: var(--fg3); margin-bottom: 6px; line-height: 1.5; }
  .v-impact { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .v-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--bg3); color: var(--fg2); }
  .v-code { background: #11111b; border-radius: 4px; padding: 8px; overflow-x: auto; position: relative; }
  .v-code pre { font-size: 11px; color: var(--fg); font-family: var(--mono); line-height: 1.5; white-space: pre-wrap; }
  .v-code .copy-btn {
    position: absolute; top: 4px; right: 4px; background: var(--bg3); border: none;
    color: var(--fg3); padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
  }
  .v-code .copy-btn:hover { color: var(--fg); }
</style>
</head>
<body>
<div class="panel">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="currentColor"/>
        <path d="M8 10h16M8 16h12M8 22h8" stroke="#1e1e2e" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      FluxAPI
    </div>
    <button id="scanBtn" class="scan-btn start" onclick="toggleScan()">▶ Start Scan</button>
    <div id="status" class="status"></div>
    <div class="header-actions">
      <select id="networkSelect" class="network-select">
        <option value="wifi">WiFi</option>
        <option value="jio-4g">Jio 4G</option>
        <option value="airtel-4g">Airtel 4G</option>
        <option value="airtel-3g">Airtel 3G</option>
        <option value="slow-3g">Slow 3G</option>
        <option value="bsnl-2g">BSNL 2G</option>
      </select>
      <button id="exportBtn" class="icon-btn" onclick="exportReport()" style="display:none">📄 Export</button>
      <button id="clearBtn" class="icon-btn" onclick="clearAll()" style="display:none">🗑️ Clear</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="idle-state" id="idleView">
      <div class="big-icon">⚡</div>
      <h2>Ready to scan</h2>
      <p>Click "Start Scan" and browse your app. FluxAPI will capture all API requests and analyze them for anti-patterns.</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Panel Logic
// ═══════════════════════════════════════════════════════════════

let scanning = false;
let scanStart = 0;
let requestCount = 0;
let timer = null;
let currentReport = null;
const tabId = chrome.devtools.inspectedWindow.tabId;

function toggleScan() {
  if (scanning) stopScan();
  else startScan();
}

function startScan() {
  scanning = true;
  scanStart = Date.now();
  requestCount = 0;

  const btn = document.getElementById('scanBtn');
  btn.className = 'scan-btn stop';
  btn.textContent = '■ Stop Scan';

  document.getElementById('exportBtn').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';

  // Tell background to start
  chrome.runtime.sendMessage({
    type: 'FLUX_START_SCAN',
    tabId,
    config: { network: document.getElementById('networkSelect').value },
  });

  // Tell content script to inject interceptors
  chrome.tabs.sendMessage(tabId, { type: 'FLUX_INJECT_START' });

  // Show live view
  showLiveView();

  // Also listen to DevTools network for requests
  chrome.devtools.network.onRequestFinished.addListener(onDevToolsRequest);
}

function stopScan() {
  scanning = false;
  const elapsed = Math.round((Date.now() - scanStart) / 1000);

  const btn = document.getElementById('scanBtn');
  btn.className = 'scan-btn analyzing';
  btn.textContent = '⏳ Analyzing...';

  // Stop capturing
  chrome.runtime.sendMessage({ type: 'FLUX_STOP_SCAN', tabId });
  chrome.tabs.sendMessage(tabId, { type: 'FLUX_INJECT_STOP' });
  chrome.devtools.network.onRequestFinished.removeListener(onDevToolsRequest);

  if (timer) { clearInterval(timer); timer = null; }

  document.getElementById('status').textContent = `Captured ${requestCount} requests in ${elapsed}s`;

  // Get session and analyze
  chrome.runtime.sendMessage({ type: 'FLUX_GET_SESSION', tabId }, (response) => {
    if (response?.ok) {
      analyzeSession(response.session);
    } else {
      showError('Failed to retrieve scan data');
    }
  });
}

function onDevToolsRequest(har) {
  if (!scanning) return;
  requestCount++;

  // Build a request record from HAR entry
  const entry = har;
  const req = {
    url: entry.request.url,
    method: entry.request.method,
    startTime: new Date(entry.startedDateTime).getTime(),
    endTime: new Date(entry.startedDateTime).getTime() + entry.time,
    status: entry.response.status,
    responseHeaders: {},
    responseSize: entry.response.content?.size || 0,
    contentType: entry.response.content?.mimeType || null,
    source: 'har',
  };

  entry.response.headers.forEach(h => {
    req.responseHeaders[h.name.toLowerCase()] = h.value;
  });

  chrome.runtime.sendMessage({
    type: 'FLUX_REQUEST_CAPTURED',
    tabId,
    request: buildHarRecord(req, requestCount),
  });
}

function buildHarRecord(raw, seq) {
  return {
    id: `har_${seq}`,
    url: raw.url,
    method: raw.method || 'GET',
    urlParts: parseUrlSimple(raw.url),
    headers: {},
    bodySize: 0,
    bodyHash: null,
    startTime: raw.startTime,
    ttfb: raw.startTime + 20,
    endTime: raw.endTime,
    duration: raw.endTime - raw.startTime,
    response: {
      status: raw.status,
      statusText: '',
      headers: raw.responseHeaders || {},
      bodySize: raw.responseSize || 0,
      contentType: raw.contentType,
      cacheHeaders: {
        cacheControl: raw.responseHeaders?.['cache-control'] || null,
        etag: raw.responseHeaders?.['etag'] || null,
        lastModified: raw.responseHeaders?.['last-modified'] || null,
        expires: null, age: null, acceptEncoding: false, contentEncoding: null,
      },
      bodyHash: `har_${seq}`,
      jsonFieldCount: null,
      fromCache: false,
    },
    initiator: { stackTrace: [], componentName: null, componentFile: null, rawStack: '' },
    navigationContext: { currentRoute: new URL(raw.url).pathname, previousRoute: null, timeSinceNavigation: 0, pageState: 'complete' },
    type: classifyUrl(raw.url, raw.method),
    source: 'har',
    error: null,
    sequence: seq,
  };
}

async function analyzeSession(session) {
  // Import the analyzer (bundled with extension)
  // For now, we'll use a simplified inline analysis
  // In production, this would import @fluxapi/scan

  try {
    const report = inlineAnalyze(session);
    currentReport = report;
    showResults(report);
  } catch (err) {
    showError('Analysis failed: ' + err.message);
  }

  const btn = document.getElementById('scanBtn');
  btn.className = 'scan-btn start';
  btn.textContent = '▶ Rescan';

  document.getElementById('exportBtn').style.display = '';
  document.getElementById('clearBtn').style.display = '';
}

// ═══════════════════════════════════════════════════════════════
// Inline Analyzer (simplified — production uses @fluxapi/scan)
// ═══════════════════════════════════════════════════════════════

function inlineAnalyze(session) {
  const requests = session.requests || [];
  const apiReqs = requests.filter(r => r.type === 'api-rest' || r.type === 'api-graphql');

  const violations = [];
  let score = 100;

  // E2: Duplicate detection
  const sigGroups = {};
  apiReqs.forEach(r => {
    const sig = `${r.method}|${r.urlParts?.pathPattern || r.url}`;
    (sigGroups[sig] = sigGroups[sig] || []).push(r);
  });
  for (const [sig, reqs] of Object.entries(sigGroups)) {
    if (reqs.length >= 2) {
      const window = 2000;
      const sorted = reqs.sort((a,b) => a.startTime - b.startTime);
      let cluster = [sorted[0]];
      for (let i = 1; i < sorted.length; i++) {
        if (sorted[i].startTime - cluster[0].startTime <= window) {
          cluster.push(sorted[i]);
        } else {
          if (cluster.length >= 2) {
            violations.push({
              ruleId: 'E2', severity: 'critical',
              title: `${sig.split('|')[1]} called ${cluster.length}x`,
              description: `Duplicate requests detected within ${window}ms`,
              impact: { requestsEliminated: cluster.length - 1, timeSavedMs: (cluster.length - 1) * 150 },
            });
            score -= Math.min(15, cluster.length * 3);
          }
          cluster = [sorted[i]];
        }
      }
      if (cluster.length >= 2) {
        violations.push({
          ruleId: 'E2', severity: 'critical',
          title: `${sig.split('|')[1]} called ${cluster.length}x`,
          description: `Duplicate requests detected within ${window}ms`,
          impact: { requestsEliminated: cluster.length - 1, timeSavedMs: (cluster.length - 1) * 150 },
        });
        score -= Math.min(15, cluster.length * 3);
      }
    }
  }

  // C1: Uncached detection
  const endpointGroups = {};
  apiReqs.filter(r => r.method === 'GET' && r.response).forEach(r => {
    const key = r.urlParts?.pathPattern || r.url;
    (endpointGroups[key] = endpointGroups[key] || []).push(r);
  });
  for (const [ep, reqs] of Object.entries(endpointGroups)) {
    if (reqs.length >= 2) {
      const allUncached = reqs.every(r => {
        const ch = r.response?.cacheHeaders;
        return !ch?.cacheControl && !ch?.etag && !ch?.lastModified;
      });
      if (allUncached) {
        violations.push({
          ruleId: 'C1', severity: 'critical',
          title: `No cache: ${ep} (${reqs.length}x)`,
          description: `No Cache-Control, ETag, or Last-Modified headers`,
          impact: { requestsEliminated: reqs.length - 1, bandwidthSavedBytes: reqs.reduce((s,r) => s + (r.response?.bodySize || 0), 0) },
        });
        score -= Math.min(12, reqs.length * 2);
      }
    }
  }

  // E3: N+1 detection
  const patternGroups = {};
  apiReqs.forEach(r => {
    const p = r.urlParts?.pathPattern || '';
    if (p.includes(':id') || p.includes(':uuid') || p.includes(':objectId')) {
      const key = `${r.method}|${p}`;
      (patternGroups[key] = patternGroups[key] || []).push(r);
    }
  });
  for (const [key, reqs] of Object.entries(patternGroups)) {
    if (reqs.length >= 5) {
      const pattern = key.split('|')[1];
      violations.push({
        ruleId: 'E3', severity: 'critical',
        title: `N+1: ${reqs.length} individual ${pattern} requests`,
        description: `Could be batched into a single request`,
        impact: { requestsEliminated: reqs.length - 1, timeSavedMs: reqs.reduce((s,r) => s + r.duration, 0) * 0.8 },
      });
      score -= Math.min(12, reqs.length);
    }
  }

  score = Math.max(0, Math.min(100, Math.round(score)));
  const grade = score >= 90 ? 'excellent' : score >= 70 ? 'good' : score >= 50 ? 'needs-work' : 'poor';

  return {
    score: { overall: score, grade },
    violations,
    session,
    summary: {
      criticalCount: violations.filter(v => v.severity === 'critical').length,
      warningCount: violations.filter(v => v.severity === 'warning').length,
      infoCount: violations.filter(v => v.severity === 'info').length,
      totalViolations: violations.length,
    },
  };
}

// ═══════════════════════════════════════════════════════════════
// Views
// ═══════════════════════════════════════════════════════════════

function showLiveView() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="live-view">
      <div class="live-count pulse" id="liveCount">0</div>
      <div class="live-label">API requests captured</div>
      <div class="live-timer" id="liveTimer">00:00</div>
    </div>
  `;

  timer = setInterval(() => {
    const elapsed = Math.round((Date.now() - scanStart) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    const el = document.getElementById('liveTimer');
    if (el) el.textContent = `${m}:${s}`;
    const countEl = document.getElementById('liveCount');
    if (countEl) countEl.textContent = requestCount;
  }, 200);
}

function showResults(report) {
  const { score, violations, summary } = report;
  const color = score.overall >= 90 ? 'var(--green)' : score.overall >= 70 ? 'var(--blue)' : score.overall >= 50 ? 'var(--orange)' : 'var(--red)';
  const dashLen = (score.overall / 100) * 207;

  let html = `
    <div class="score-header">
      <div class="score-circle">
        <svg viewBox="0 0 80 80">
          <circle class="bg" cx="40" cy="40" r="33"/>
          <circle class="fill" cx="40" cy="40" r="33" stroke-dasharray="${dashLen} 207" style="stroke:${color}"/>
        </svg>
        <div class="score-value" style="color:${color}">${score.overall}</div>
      </div>
      <div class="score-meta">
        <h2>API Health Score</h2>
        <div class="grade" style="color:${color}">${capitalize(score.grade)}</div>
        <div class="stats">
          🔴 ${summary.criticalCount} critical · 🟡 ${summary.warningCount} warnings · ℹ️ ${summary.infoCount} info
        </div>
      </div>
    </div>
  `;

  if (violations.length > 0) {
    html += `<div class="section-title">Issues Found (${violations.length})</div>`;
    violations.forEach((v, i) => {
      html += `
        <div class="violation" onclick="this.classList.toggle('expanded')">
          <div class="v-header">
            <div class="v-dot ${v.severity}"></div>
            <div class="v-title">[${v.ruleId}] ${escHtml(v.title)}</div>
            <span class="v-badge ${v.severity}">${v.severity}</span>
          </div>
          <div class="v-body">
            <div class="v-desc">${escHtml(v.description)}</div>
            <div class="v-impact">
              ${v.impact?.timeSavedMs > 0 ? `<span class="v-tag">⚡ ${Math.round(v.impact.timeSavedMs)}ms faster</span>` : ''}
              ${v.impact?.requestsEliminated > 0 ? `<span class="v-tag">📉 ${v.impact.requestsEliminated} fewer</span>` : ''}
              ${v.impact?.bandwidthSavedBytes > 0 ? `<span class="v-tag">💾 ${Math.round(v.impact.bandwidthSavedBytes / 1024)}KB</span>` : ''}
            </div>
          </div>
        </div>
      `;
    });
  } else {
    html += `<div style="text-align:center;color:var(--green);padding:24px">✨ No issues found!</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div style="text-align:center;color:var(--red);padding:40px">
      <div style="font-size:32px;margin-bottom:8px">❌</div>
      <div>${escHtml(msg)}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// Actions
// ═══════════════════════════════════════════════════════════════

function exportReport() {
  if (!currentReport) return;
  const json = JSON.stringify(currentReport, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fluxapi-report-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  currentReport = null;
  requestCount = 0;
  chrome.runtime.sendMessage({ type: 'FLUX_CLEAR', tabId });
  document.getElementById('content').innerHTML = `
    <div class="idle-state">
      <div class="big-icon">⚡</div>
      <h2>Ready to scan</h2>
      <p>Click "Start Scan" and browse your app.</p>
    </div>
  `;
  document.getElementById('exportBtn').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('status').textContent = '';
}

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════

function parseUrlSimple(rawUrl) {
  try {
    const u = new URL(rawUrl);
    const segments = u.pathname.split('/').filter(Boolean);
    const pattern = '/' + segments.map(s => {
      if (/^\d+$/.test(s)) return ':id';
      if (/^[0-9a-f]{8}-/.test(s)) return ':uuid';
      return s;
    }).join('/');
    return { host: u.host, pathPattern: pattern, pathname: u.pathname };
  } catch { return { host: '', pathPattern: rawUrl, pathname: rawUrl }; }
}

function classifyUrl(url, method) {
  const l = url.toLowerCase();
  if (l.includes('/graphql')) return 'api-graphql';
  if (/\.(js|css|png|jpg|svg|ico|woff)/.test(l)) return 'static';
  if (l.includes('/api/') || (method && method !== 'GET')) return 'api-rest';
  return 'other';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
</script>
</body>
</html>
